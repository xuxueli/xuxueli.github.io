<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>密码生成器 — Dev Tools</title>
<style>
  :root{--bg:#ffffff;--surface:#f5f7fa;--border:#e5e9ec;--accent:#ec4899;--text:#1f2937;--muted:#6b7280;--radius:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;align-items:center;gap:12px;padding:14px 24px;background:#fff;border-bottom:1px solid var(--border)}
  nav a{color:var(--muted);text-decoration:none;font-size:.88rem}nav a:hover{color:var(--text)}
  nav .sep{color:var(--border)}nav .cur{color:var(--text);font-weight:600}
  h1{padding:28px 24px 0;font-size:1.4rem;font-weight:800}h1 span{color:var(--accent)}

  .workspace{flex:1;padding:24px;display:flex;flex-direction:column;gap:20px;max-width:700px}

  /* Password display */
  .pwd-display{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 18px;display:flex;align-items:center;gap:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.02);
  }
  #pwdText{
    flex:1;font-family:'Fira Code','Consolas',monospace;font-size:1.15rem;
    color:var(--text);word-break:break-all;letter-spacing:.05em;line-height:1.5;
    background:transparent;border:none;outline:none;resize:none;
  }
  .icon-btn{
    background:transparent;border:1px solid var(--border);border-radius:8px;
    padding:8px 12px;color:var(--muted);cursor:pointer;font-size:1rem;
    transition:.15s;flex-shrink:0
  }
  .icon-btn:hover{border-color:var(--accent);color:var(--text)}

  /* Strength bar */
  .strength-wrap{display:flex;flex-direction:column;gap:6px}
  .strength-label{font-size:.78rem;color:var(--muted);display:flex;justify-content:space-between}
  .strength-label span{font-weight:700}
  .bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width .3s,background .3s}

  /* Options */
  .card{background:#f5f7fa;border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .card h2{font-size:.9rem;font-weight:700;margin-bottom:16px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}

  /* Length slider */
  .length-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .length-row label{font-size:.88rem;white-space:nowrap;min-width:60px}
  input[type=range]{flex:1;accent-color:var(--accent)}
  #lenVal{min-width:28px;text-align:right;font-weight:700;color:var(--accent)}

  /* Checkboxes */
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:420px){.checks{grid-template-columns:1fr}}
  .check-item{display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;user-select:none}
  .check-item input{accent-color:var(--accent);width:15px;height:15px}

  /* Exclude / Batch */
  .field-row{display:flex;flex-direction:column;gap:6px;margin-top:14px}
  .field-row label{font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .field-row input[type=text]{
    background:#252836;border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'Fira Code',monospace;font-size:.87rem;
    padding:9px 12px;outline:none;transition:border-color .2s;
  }
  .field-row input[type=text]:focus{border-color:var(--accent)}

  /* Batch list */
  #batchList{
    background:#252836;border:1px solid var(--border);border-radius:var(--radius);
    padding:14px;font-family:'Fira Code',monospace;font-size:.84rem;
    line-height:2;display:none;max-height:240px;overflow-y:auto;
  }
  .batchPwd{cursor:pointer;transition:color .15s;display:block}
  .batchPwd:hover{color:var(--accent)}

  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{padding:9px 22px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;
    border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s}
  .btn:hover{background:#252836;border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{opacity:.88}

  #toast{position:fixed;bottom:28px;right:28px;background:#252836;border:1px solid var(--border);
    border-radius:8px;padding:10px 18px;font-size:.85rem;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}
  #toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
  <a href="../index.html">🏠 工具箱</a>
  <span class="sep">›</span>
  <span class="cur">🔑 密码生成器</span>
</nav>

<h1><span>🔑</span> 密码生成器</h1>

<div class="workspace">

  <!-- Password output -->
  <div class="pwd-display">
    <textarea id="pwdText" rows="2" readonly>点击"生成"按钮</textarea>
    <button class="icon-btn" onclick="copyPwd()" title="复制">📋</button>
    <button class="icon-btn" onclick="generate()" title="重新生成">🔄</button>
  </div>

  <!-- Strength -->
  <div class="strength-wrap">
    <div class="strength-label"><span>密码强度</span><span id="strLabel">—</span></div>
    <div class="bar-track"><div class="bar-fill" id="strBar" style="width:0%;background:#444"></div></div>
  </div>

  <!-- Options -->
  <div class="card">
    <h2>配置</h2>
    <div class="length-row">
      <label>长度</label>
      <input type="range" id="lenSlider" min="4" max="128" value="16" oninput="lenVal.textContent=this.value"/>
      <span id="lenVal">16</span>
    </div>
    <div class="checks">
      <label class="check-item"><input type="checkbox" id="useUpper" checked> 大写字母 (A-Z)</label>
      <label class="check-item"><input type="checkbox" id="useLower" checked> 小写字母 (a-z)</label>
      <label class="check-item"><input type="checkbox" id="useDigit" checked> 数字 (0-9)</label>
      <label class="check-item"><input type="checkbox" id="useSymbol" checked> 符号 (!@#…)</label>
      <label class="check-item"><input type="checkbox" id="useNoAmb"> 排除易混淆 (0O1lI)</label>
    </div>

    <div class="field-row">
      <label>额外排除字符</label>
      <input type="text" id="excludeChars" placeholder="例如：;\"'`，不需要排除则留空"/>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="generate()">生成密码</button>
    <button class="btn" onclick="genBatch()">批量生成 10 个</button>
    <button class="btn" onclick="document.getElementById('batchList').style.display='none'">清空批量</button>
  </div>

  <div id="batchList"></div>

</div>

<div id="toast"></div>

<script>
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER='abcdefghijklmnopqrstuvwxyz';
const DIGIT='0123456789';
const SYMBOL='!@#$%^&*()-_=+[]{}|;:,.<>?/~';
const AMB='0O1lI';

function getCharset(){
  let s='';
  if(document.getElementById('useUpper').checked) s+=UPPER;
  if(document.getElementById('useLower').checked) s+=LOWER;
  if(document.getElementById('useDigit').checked) s+=DIGIT;
  if(document.getElementById('useSymbol').checked) s+=SYMBOL;
  if(document.getElementById('useNoAmb').checked){
    [...AMB].forEach(c=>{ s=s.split(c).join(''); });
  }
  const excl=document.getElementById('excludeChars').value;
  [...excl].forEach(c=>{ s=s.split(c).join(''); });
  return s;
}

function randPwd(len,charset){
  if(!charset) return '';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  return [...arr].map(n=>charset[n%charset.length]).join('');
}

function calcStrength(pwd,charset){
  // entropy bits = len * log2(charsetSize)
  const entropy=pwd.length*Math.log2(charset.length||1);
  if(entropy<28) return{score:1,label:'非常弱',color:'#f87171',pct:15};
  if(entropy<36) return{score:2,label:'弱',color:'#fb923c',pct:30};
  if(entropy<60) return{score:3,label:'一般',color:'#fbbf24',pct:55};
  if(entropy<80) return{score:4,label:'强',color:'#4ade80',pct:80};
  return{score:5,label:'非常强',color:'#22d3ee',pct:100};
}

function generate(){
  const len=+document.getElementById('lenSlider').value;
  const charset=getCharset();
  if(!charset){showToast('请至少选择一种字符类型');return}
  const pwd=randPwd(len,charset);
  document.getElementById('pwdText').value=pwd;
  updateStrength(pwd,charset);
}

function updateStrength(pwd,charset){
  if(!charset) charset=getCharset();
  const s=calcStrength(pwd,charset);
  document.getElementById('strLabel').textContent=s.label;
  const bar=document.getElementById('strBar');
  bar.style.width=s.pct+'%';
  bar.style.background=s.color;
}

function genBatch(){
  const len=+document.getElementById('lenSlider').value;
  const charset=getCharset();
  if(!charset){showToast('请至少选择一种字符类型');return}
  const list=document.getElementById('batchList');
  list.style.display='block';
  list.innerHTML='';
  for(let i=0;i<10;i++){
    const pwd=randPwd(len,charset);
    const span=document.createElement('span');
    span.className='batchPwd';
    span.textContent=pwd;
    span.title='点击复制';
    span.onclick=()=>navigator.clipboard.writeText(pwd).then(()=>showToast('已复制 ✓'));
    list.appendChild(span);
  }
}

function copyPwd(){
  const v=document.getElementById('pwdText').value;
  if(!v||v==='点击"生成"按钮'){showToast('先生成密码吧');return}
  navigator.clipboard.writeText(v).then(()=>showToast('已复制 ✓'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// auto-generate on load
generate();
</script>
</body>
</html>
